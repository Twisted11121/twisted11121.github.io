<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Literary Quiz</title>
    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ecf0f1;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.5s ease;
        }

        /* Theme Variables - Will be updated by JS */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --accent-hover: #2980b9;
            --success-color: #27ae60;
            --error-color: #c0392b;
            --bg-color: #ecf0f1;
            --card-bg: #ffffff;
        }

        /* Container */
        .quiz-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 700px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: var(--primary-color);
            color: white;
            padding: 25px;
            text-align: center;
            transition: background-color 0.5s ease;
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-bottom: 15px;
            font-weight: 300;
        }

        .progress-container {
            background: rgba(255, 255, 255, 0.2);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            transition: width 0.3s ease, background-color 0.5s ease;
        }

        /* Screen Visibility Helpers */
        .screen {
            display: none;
            padding: 40px 30px;
            text-align: center;
            flex-grow: 1;
            flex-direction: column;
            justify-content: center;
        }

        .screen.active {
            display: flex;
        }

        /* --- MENU SCREEN --- */
        .menu-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 20px;
            width: 100%;
        }

        @media (min-width: 500px) {
            .menu-options {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }

        .menu-card {
            background: white;
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: var(--accent-color);
        }

        .menu-card h3 {
            font-size: 1.1rem;
            color: #555;
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            margin-bottom: 5px;
        }

        /* --- GAME SCREEN --- */
        .question-label {
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--primary-color);
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            width: 100%;
        }

        @media (min-width: 550px) {
            .options-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .option-btn {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-color);
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent-color);
            background-color: #f9f9f9;
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background-color: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        .option-btn.wrong {
            background-color: var(--error-color);
            border-color: var(--error-color);
            color: white;
            opacity: 0.9;
        }

        .option-btn:disabled {
            cursor: default;
            transform: none;
        }

        .feedback-msg {
            margin-top: 20px;
            font-weight: 600;
            min-height: 24px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .feedback-msg.visible { opacity: 1; }

        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            height: 50px; /* Prevent layout jump */
        }

        .next-btn, .restart-btn, .menu-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 600;
        }
        
        .menu-btn {
            background-color: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            margin-top: 10px;
            font-size: 0.9rem;
            padding: 8px 20px;
        }
        .menu-btn:hover { background-color: rgba(255,255,255,0.1); }

        .next-btn:hover { background-color: var(--accent-hover); }

        /* --- RESULTS SCREEN --- */
        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0 auto 20px auto;
            border: 5px solid rgba(0,0,0,0.1);
        }

        .results-msg {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #555;
        }

        .result-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .secondary-btn {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }
        .secondary-btn:hover {
            background-color: var(--primary-color);
            color: white;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

    </style>
</head>
<body>

    <div class="quiz-container">
        <header>
            <h1 id="headerTitle">Literary Mega Quiz</h1>
            <div class="subtitle" id="headerSubtitle">Select a category to begin</div>
            <div class="progress-container" id="progressContainer" style="display:none;">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <button id="backToMenuBtn" class="menu-btn" style="display:none;" onclick="showMenu()">← Back to Menu</button>
        </header>

        <!-- MENU SCREEN -->
        <div id="menuScreen" class="screen active">
            <h2>Choose a Challenge</h2>
            <div class="menu-options">
                <!-- Authors Quiz -->
                <div class="menu-card" onclick="startQuiz('authors')">
                    <div class="icon-circle" style="background: #3498db;">✎</div>
                    <h3>Authors</h3>
                </div>
                <!-- Periods Quiz -->
                <div class="menu-card" onclick="startQuiz('periods')">
                    <div class="icon-circle" style="background: #7b1fa2;">⏳</div>
                    <h3>Periods</h3>
                </div>
                <!-- Types Quiz -->
                <div class="menu-card" onclick="startQuiz('types')">
                    <div class="icon-circle" style="background: #00897b;">📚</div>
                    <h3>Types</h3>
                </div>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="gameScreen" class="screen">
            <div class="question-label">Literary Work</div>
            <div class="question-text" id="questionText">Loading...</div>
            
            <div class="options-grid" id="optionsGrid">
                <!-- Buttons injected here -->
            </div>

            <div class="feedback-msg" id="feedbackMsg"></div>

            <div class="controls">
                <button class="next-btn" id="nextBtn">Next Question</button>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="resultScreen" class="screen">
            <div class="score-circle" id="finalScore">0</div>
            <h2>Quiz Complete!</h2>
            <p class="results-msg" id="resultMessage">Well done!</p>
            <div class="result-actions">
                <button class="restart-btn" onclick="restartQuiz()">Play Again</button>
                <button class="restart-btn secondary-btn" onclick="showMenu()">Main Menu</button>
            </div>
        </div>
    </div>

    <script>
        /* --- DATASETS MERGED --- */
        // Combining the 3 lists into a master list to ensure consistency
        const rawDataAuthors = [
            { title: "Prilika o izgubljenem sinu", author: "Anonimno" },
            { title: "Kralj Ojdip", author: "Sofokles" },
            { title: "Pridiga o grehu in pokori", author: "Anonimno" },
            { title: "Romeo in Julija", author: "William Shakespeare" },
            { title: "Jevgenij Onjegin", author: "Aleksander Puškin" },
            { title: "Zločin in kazen", author: "Fjodor Mihajlovič Dostojevski" },
            { title: "Krst pri Savici", author: "France Prešeren" },
            { title: "Zdravljica", author: "France Prešeren" },
            { title: "Plešasta pevka", author: "Eugene Ionesco" },
            { title: "Preobrazba", author: "Franz Kafka" },
            { title: "Kostanj posebne sorte", author: "Ivan Cankar" },
            { title: "Hlapci", author: "Ivan Cankar" },
            { title: "Menuet za kitaro", author: "Vitomil Zupan" },
            { title: "Vladimir", author: "Matjaž Zupančič" },
            { title: "Tantadruj", author: "Ciril Kosmač" },
            { title: "Na trgu", author: "Dragotin Kette" },
            { title: "Gobice", author: "Tomaž Šalamun" },
            { title: "Veliki brilijantni valček", author: "Drago Jančar" },
            { title: "Ta veseli dan ali Matiček se ženi", author: "Anton Tomaž Linhart" },
            { title: "Mejnik", author: "Anton Aškerc" },
            { title: "Večerna pravljica", author: "Gregor Strniša" },
            { title: "Črni Deček", author: "Dane Zajc" },
            { title: "Južni otok", author: "Kajetan Kovič" },
            { title: "Režonja na svojem", author: "Miško Kranjec" },
            { title: "Samorastniki", author: "Prežihov Voranc" },
            { title: "Dogodek v mestu Gogi", author: "Slavko Grum" },
            { title: "Matkova Tina", author: "Ivan Pregelj" },
            { title: "Kons 5", author: "Srečko Kosovel" },
            { title: "Z vlakom", author: "Oton Župančič" },
            { title: "Saloma", author: "Oscar Wilde" },
            { title: "Visoška kronika", author: "Ivan Tavčar" },
            { title: "Tilka", author: "Simon Jenko" },
            { title: "Deseti brat", author: "Josip Jurčič" },
            { title: "Proti zidavi cerkva", author: "Primož Trubar" },
            { title: "Lepa Vida", author: "Anonimno" }
        ];

        const rawDataPeriods = [
            { period: "Biblijsko delo" }, { period: "Antika" }, { period: "Srednji vek" },
            { period: "Renesansa" }, { period: "Evropska romantika" }, { period: "Evropski realizem" },
            { period: "Romantika" }, { period: "Romantika" }, { period: "Modernizem" },
            { period: "Modernizem" }, { period: "Moderna" }, { period: "Moderna" }, { period: "Postmodernizem" },
            { period: "Sodobna proza" }, { period: "Socialni realizem" }, { period: "Moderna" },
            { period: "Neoavantgarda" }, { period: "Sodobna proza" }, { period: "Razsvetljenstvo" },
            { period: "Realizem" }, { period: "Modernizem" }, { period: "Modernizem" }, { period: "Intimizem" },
            { period: "Socialni realizem" }, { period: "Socialni realizem" }, { period: "Avantgarda" },
            { period: "Ekspresionizem" }, { period: "Avantgarda" }, { period: "Moderna" },
            { period: "Evropska moderna" }, { period: "Realizem" }, { period: "Romantika & Realizem" },
            { period: "Romantika & Realizem" }, { period: "Reformacija" }, { period: "Ljudsko slovstvo" }
        ];

        const rawDataTypes = [
            { type: "Biblijsko delo" }, { type: "Tragedija" }, { type: "Pridiga" },
            { type: "Tragedija" }, { type: "Roman v verzih" }, { type: "Roman" },
            { type: "Lirski ep" }, { type: "Lirika / Napitnica / Himna" }, { type: "Drama" },
            { type: "Novela" }, { type: "Črtica" }, { type: "Drama" }, { type: "Roman" },
            { type: "Proza" }, { type: "Novela" }, { type: "Lirika / Podoknica" }, { type: "Lirika" },
            { type: "Proza" }, { type: "Komedija" }, { type: "Balada" }, { type: "Modernistična pesem" },
            { type: "Modernistična pesem" }, { type: "Intimistična pesem" }, { type: "Novela" },
            { type: "Novela" }, { type: "Drama" }, { type: "Novela" }, { type: "Avantgardna pesem" },
            { type: "Lirika / Impresionizem" }, { type: "Poeitična drama" }, { type: "Zgodovinski roman" },
            { type: "Novela" }, { type: "Roman" }, { type: "Verska proza" }, { type: "Ljudska balada" }
        ];

        // Merge data into one master array
        const masterData = rawDataAuthors.map((item, index) => ({
            title: item.title,
            author: item.author,
            period: rawDataPeriods[index].period,
            type: rawDataTypes[index].type
        }));

        /* --- CONFIGURATION --- */
        const config = {
            authors: {
                key: 'author',
                title: 'Literary Quiz',
                subtitle: 'Match the work to its author',
                colors: { primary: '#2c3e50', accent: '#3498db', hover: '#2980b9', bg: '#ecf0f1' }
            },
            periods: {
                key: 'period',
                title: 'Literary Periods',
                subtitle: 'Match the work to its time period',
                colors: { primary: '#4a148c', accent: '#7b1fa2', hover: '#6a1b9a', bg: '#f3e5f5' }
            },
            types: {
                key: 'type',
                title: 'Literary Types',
                subtitle: 'Match the work to its literary genre',
                colors: { primary: '#00695c', accent: '#00897b', hover: '#00796b', bg: '#e0f2f1' }
            }
        };

        /* --- STATE VARIABLES --- */
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let isAnswered = false;
        let currentMode = null;

        /* --- DOM ELEMENTS --- */
        const screens = {
            menu: document.getElementById('menuScreen'),
            game: document.getElementById('gameScreen'),
            result: document.getElementById('resultScreen')
        };
        const headerTitle = document.getElementById('headerTitle');
        const headerSubtitle = document.getElementById('headerSubtitle');
        const progressContainer = document.getElementById('progressContainer');
        const backToMenuBtn = document.getElementById('backToMenuBtn');
        
        const questionText = document.getElementById('questionText');
        const optionsGrid = document.getElementById('optionsGrid');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const feedbackMsg = document.getElementById('feedbackMsg');
        const finalScore = document.getElementById('finalScore');
        const resultMessage = document.getElementById('resultMessage');

        /* --- FUNCTIONS --- */

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        function setTheme(modeConfig) {
            const root = document.documentElement;
            root.style.setProperty('--primary-color', modeConfig.colors.primary);
            root.style.setProperty('--accent-color', modeConfig.colors.accent);
            root.style.setProperty('--accent-hover', modeConfig.colors.hover);
            document.body.style.backgroundColor = modeConfig.colors.bg;
        }

        function showMenu() {
            headerTitle.textContent = "Literary Mega Quiz";
            headerSubtitle.textContent = "Select a category to begin";
            progressContainer.style.display = 'none';
            backToMenuBtn.style.display = 'none';
            switchScreen('menu');
        }

        function startQuiz(mode) {
            currentMode = mode;
            const modeConfig = config[mode];
            
            // Setup UI
            setTheme(modeConfig);
            headerTitle.textContent = modeConfig.title;
            headerSubtitle.textContent = modeConfig.subtitle;
            progressContainer.style.display = 'block';
            backToMenuBtn.style.display = 'inline-block';

            // Setup Data
            score = 0;
            currentQuestionIndex = 0;
            isAnswered = false;
            // Clone and shuffle master data
            questions = shuffle([...masterData]); 

            updateProgress();
            switchScreen('game');
            loadQuestion();
        }

        function restartQuiz() {
            if (currentMode) startQuiz(currentMode);
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function loadQuestion() {
            isAnswered = false;
            nextBtn.style.display = 'none';
            feedbackMsg.className = 'feedback-msg';
            feedbackMsg.textContent = '';
            
            const currentQ = questions[currentQuestionIndex];
            const modeConfig = config[currentMode];
            
            // Animate text
            questionText.classList.remove('animate-in');
            void questionText.offsetWidth; 
            questionText.textContent = currentQ.title;
            questionText.classList.add('animate-in');

            generateOptions(currentQ, modeConfig.key);
            updateProgress();
        }

        function generateOptions(currentQ, key) {
            const correctAnswer = currentQ[key];
            // Get all possible answers for this mode (deduplicated)
            const allAnswers = [...new Set(masterData.map(item => item[key]))];
            
            // Filter out correct answer to get distractors
            const distractors = allAnswers.filter(a => a !== correctAnswer);
            
            // Shuffle distractors and pick 3
            const selectedDistractors = shuffle(distractors).slice(0, 3);
            
            // Combine and shuffle
            const options = shuffle([correctAnswer, ...selectedDistractors]);

            optionsGrid.innerHTML = '';

            options.forEach(answerText => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = answerText;
                btn.onclick = () => handleAnswer(btn, answerText, correctAnswer);
                optionsGrid.appendChild(btn);
            });
        }

        function handleAnswer(selectedBtn, selectedVal, correctVal) {
            if (isAnswered) return;
            isAnswered = true;

            const allBtns = optionsGrid.querySelectorAll('.option-btn');
            allBtns.forEach(btn => btn.disabled = true);

            if (selectedVal === correctVal) {
                score++;
                selectedBtn.classList.add('correct');
                feedbackMsg.textContent = "Correct!";
                feedbackMsg.style.color = "var(--success-color)";
            } else {
                selectedBtn.classList.add('wrong');
                feedbackMsg.textContent = `Incorrect. It was: ${correctVal}`;
                feedbackMsg.style.color = "var(--error-color)";
                
                // Highlight correct answer
                allBtns.forEach(btn => {
                    if (btn.textContent === correctVal) {
                        btn.classList.add('correct');
                    }
                });
            }

            feedbackMsg.classList.add('visible');
            nextBtn.style.display = 'inline-block';
        }

        nextBtn.addEventListener('click', () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        });

        function updateProgress() {
            const percent = ((currentQuestionIndex) / questions.length) * 100;
            progressBar.style.width = `${percent}%`;
        }

        function showResults() {
            switchScreen('result');
            progressBar.style.width = '100%';
            backToMenuBtn.style.display = 'none'; // Hide on result screen, use button instead

            finalScore.textContent = score;

            const percentage = (score / questions.length) * 100;
            let message = "";
            
            if (percentage === 100) message = "Perfect! You are a literary expert.";
            else if (percentage >= 80) message = "Excellent work!";
            else if (percentage >= 50) message = "Good job, keep practicing!";
            else message = "Don't give up, try again!";

            resultMessage.textContent = message;
        }

        // Initialize
        showMenu();

    </script>
</body>
</html>
